services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emailai
      POSTGRES_PASSWORD: emailai
      POSTGRES_DB: emailai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "emailai"]
      interval: 5s
      retries: 5

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://emailai:emailai@db:5432/emailai
      SECRET_KEY: change-me-in-prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata: {}
